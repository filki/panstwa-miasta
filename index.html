<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Państwa-Miasta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #10b981;
            --warning: #f59e0b;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container { 
            background: var(--surface); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
        }

        h1 { text-align: center; color: var(--primary); margin-top: 0; font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; }
        
        .layout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .layout-grid { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        
        input { 
            padding: 0.8rem 1rem; 
            width: 100%; 
            box-sizing: border-box; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem; 
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        input:disabled { opacity: 0.6; cursor: not-allowed; }

        button { 
            padding: 0.8rem 1.5rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button.danger { background: var(--danger); }
        button.danger:hover:not(:disabled) { background: var(--danger-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .letter-display {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .action-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .sidebar {
            background: var(--bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .scoreboard {
            margin-bottom: 1rem;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .score-item:last-child { border-bottom: none; }
        .score-item strong { color: var(--accent); }

        #logs { 
            border: 2px solid var(--border); 
            padding: 1rem; 
            height: 250px; 
            overflow-y: auto; 
            background: var(--bg); 
            border-radius: 8px; 
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-entry { 
            padding: 0.75rem; 
            border-radius: 6px; 
            background: var(--surface);
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.3s ease;
            font-size: 0.95rem;
        }
        
        .system-msg { border-left-color: var(--warning); color: var(--text-muted); font-style: italic; }
        .results-msg { border-left-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .sender { font-weight: 800; margin-bottom: 0.3rem; color: var(--primary); }

        .chat-input-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .chat-input-group input { flex-grow: 1; }
        .chat-input-group button { width: auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Państwa-Miasta Engine</h1>
        
        <div id="join-section">
            <div class="form-group">
                <label for="nickname">Twój Nick</label>
                <input type="text" id="nickname" placeholder="Wpisz swój nick..." required>
            </div>
            <div class="form-group">
                <label for="room_id">ID Pokoju</label>
                <input type="text" id="room_id" placeholder="np. lobby123" required>
            </div>
            <button onclick="connect()">Dołącz do Gry</button>
        </div>

        <div id="chat-section" style="display: none;">
            <div class="layout-grid">
                <!-- Lewa kolumna: Gra -->
                <div class="main-game">
                    <div class="game-header">
                        <div>
                            <label>Pokój</label>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--text-muted);" id="current-room"></div>
                        </div>
                        <div style="text-align: right;">
                            <label>Gramy na literę</label>
                            <div class="letter-display" id="current-letter">?</div>
                        </div>
                    </div>

                    <div class="categories-grid" id="categories">
                        <div class="form-group"><label>Państwo</label><input type="text" data-category="Państwo" disabled></div>
                        <div class="form-group"><label>Miasto</label><input type="text" data-category="Miasto" disabled></div>
                        <div class="form-group"><label>Rzecz</label><input type="text" data-category="Rzecz" disabled></div>
                        <div class="form-group"><label>Zwierzę</label><input type="text" data-category="Zwierzę" disabled></div>
                        <div class="form-group"><label>Roślina</label><input type="text" data-category="Roślina" disabled></div>
                        <div class="form-group"><label>Imię</label><input type="text" data-category="Imię" disabled></div>
                    </div>

                    <div class="action-row">
                        <button onclick="drawLetter()" id="btn-draw">🎲 Start Rundy</button>
                        <button onclick="stopGame()" id="btn-stop" class="danger" disabled>🛑 STOP!</button>
                    </div>
                </div>

                <!-- Prawa kolumna: Sidebar -->
                <div class="sidebar">
                    <label>Wyniki</label>
                    <div class="scoreboard" id="scoreboard">
                        <!-- Wyniki generowane dynamicznie -->
                    </div>

                    <label>Czat & Logi</label>
                    <div id="logs"></div>
                    <div class="chat-input-group">
                        <input type="text" id="message-input" placeholder="Napisz wiadomość...">
                        <button onclick="sendChat()">Wyślij</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let myNick = "";

        function addLog(htmlContent, typeClass) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${typeClass}`;
            entry.innerHTML = htmlContent;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function updateScoreboard(scores) {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            // Sortujemy malejąco po wynikach
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            sorted.forEach(([player, score]) => {
                const div = document.createElement('div');
                div.className = 'score-item';
                div.innerHTML = `<span>${player}</span> <strong>${score} pkt</strong>`;
                sb.appendChild(div);
            });
        }

        function connect() {
            const nickname = document.getElementById('nickname').value.trim();
            const roomId = document.getElementById('room_id').value.trim();

            if (!nickname || !roomId) return alert('Proszę podać nick i ID pokoju.');

            myNick = nickname;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${roomId}/${nickname}`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('join-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                document.getElementById('current-room').textContent = roomId;
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "system") {
                    addLog(`<em>${msg.message}</em>`, "system-msg");
                } 
                else if (msg.type === "score_update") {
                    updateScoreboard(msg.scores);
                }
                else if (msg.type === "chat") {
                    addLog(`<div class="sender">${msg.sender}</div><div>${msg.text}</div>`, "");
                }
                else if (msg.type === "round_started") {
                    document.getElementById("current-letter").textContent = msg.letter;
                    addLog(`<em>Gra rozpoczęta! Litera: <strong>${msg.letter}</strong> (Start od: ${msg.sender})</em>`, "system-msg");
                    enableInputs();
                }
                else if (msg.type === "stop_round") {
                    addLog(`<em>🚨 <strong>${msg.sender} krzyknął STOP!</strong> Oczekiwanie na przesłanie odpowiedzi...</em>`, "system-msg");
                    disableAndSubmit();
                }
                else if (msg.type === "round_results") {
                    let html = `<div class="sender">Wyniki Rundy:</div>`;
                    
                    // Pokazujemy ile kto dostał punktów w tej rundzie
                    for (const [player, rScore] of Object.entries(msg.round_scores)) {
                        html += `<div style="margin-bottom: 0.5rem"><strong>${player}: +${rScore} pkt</strong><br>`;
                        const pAnswers = msg.answers[player] || {};
                        for (const [cat, val] of Object.entries(pAnswers)) {
                            if(val) html += `<span style="font-size:0.8em; color:var(--text-muted);">${cat}:</span> ${val} `;
                        }
                        html += `</div>`;
                    }
                    
                    addLog(html, "results-msg");
                    updateScoreboard(msg.total_scores);
                    
                    // Reset UI
                    document.getElementById('btn-draw').disabled = false;
                }
            };

            ws.onclose = (e) => {
                if(e.code === 1008) alert('Nick zajęty!');
                window.location.reload();
            };
        }

        function sendJson(obj) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
        }

        function sendChat() {
            const input = document.getElementById('message-input');
            if (input.value.trim()) {
                sendJson({ type: "chat", text: input.value.trim() });
                input.value = '';
            }
        }

        function drawLetter() {
            sendJson({ type: "draw" });
        }

        function stopGame() {
            sendJson({ type: "stop" });
        }

        function enableInputs() {
            const inputs = document.querySelectorAll('#categories input');
            inputs.forEach(inp => {
                inp.disabled = false;
                inp.value = '';
            });
            inputs[0].focus();
            document.getElementById('btn-draw').disabled = true;
            document.getElementById('btn-stop').disabled = false;
        }

        function disableAndSubmit() {
            const inputs = document.querySelectorAll('#categories input');
            let answers = {};
            inputs.forEach(inp => {
                answers[inp.dataset.category] = inp.value.trim();
                inp.disabled = true;
            });
            
            document.getElementById('btn-stop').disabled = true;
            sendJson({ type: "answers", answers: answers });
        }

        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendChat();
        });
        
        // Zgłaszaj odpowiedzi Enterem
        const catInputs = document.querySelectorAll('#categories input');
        catInputs.forEach((inp, i) => {
            inp.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    if(i < catInputs.length - 1) catInputs[i+1].focus();
                    else stopGame(); // Ostatni input i enter = STOP!
                }
            });
        });
    </script>
</body>
</html>
