services:
  web:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
    command:
      - uv
      - run
      - uvicorn
      - panstwa_miasta.main:app
      - --reload
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
