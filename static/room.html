<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1220">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>Pokój gry | Państwa-Miasta Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo" style="text-decoration:none;">Państwa<span>Miasta</span></a>
            <div class="nav-links">
                <a href="/" class="nav-link-extra">Strona główna</a>
            </div>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <!-- JOIN STEP -->
            <section id="room-inline-join" class="join-card" style="max-width: 520px; margin: 0 auto;">
                <div class="section-header">
                    <h2>Dołącz do pokoju</h2>
                    <p id="room-inline-label">Pokój: -</p>
                </div>

                <div id="join-section">
                    <div class="form-group">
                        <span class="header-label">Twój nickname</span>
                        <input type="text" id="nickname" placeholder="Wpisz swoje imię..." maxlength="20" autocomplete="nickname" inputmode="text">
                    </div>
                    <button type="button" onclick="connect()">DOŁĄCZ DO GRY</button>
                </div>
            </section>

            <!-- GAME STEP -->
            <div id="chat-section" style="display: none;">
                <div class="layout-grid" id="game-layout">

                    <aside class="sidebar" id="scoreboard-sidebar">
                        <div class="sidebar-header">🏆 Ranking graczy</div>
                        <div class="scoreboard" id="scoreboard"></div>

                        <div id="restart-settings" class="restart-card" style="display: none;">
                            <h3>Zagraj ponownie</h3>
                            <div class="settings-grid">
                                <div>
                                    <label>Rundy</label>
                                    <select id="restart-rounds">
                                        <option value="1">1</option>
                                        <option value="3">3</option>
                                        <option value="5" selected>5</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Czas</label>
                                    <select id="restart-limit">
                                        <option value="60">60</option>
                                        <option value="90" selected>90</option>
                                    </select>
                                </div>
                            </div>
                            <div class="restart-buttons">
                                <button type="button" id="btn-restart-game" onclick="requestRestart()" style="display: none;">Nowa gra</button>
                                <button type="button" id="btn-dissolve" onclick="dissolveRoom()" class="danger" style="display: none;">Rozwiąż pokój</button>
                            </div>
                        </div>
                    </aside>

                    <section class="main-game" id="game-main-area">
                        <header class="game-header">
                            <div>
                                <span class="header-label">Pokój</span>
                                <div id="current-room" style="font-weight:800;"></div>
                            </div>
                            <div class="text-center">
                                <span class="header-label">Litera</span>
                                <div class="letter-display" id="current-letter">?</div>
                            </div>
                            <div style="text-align: right;">
                                <span class="header-label">Czas</span>
                                <div id="round-timer" style="color: var(--warning); font-weight: 800; font-size: 2rem;">--</div>
                            </div>
                        </header>

                        <div class="categories-grid" id="categories">
                            <div class="form-group"><label>🌍 Państwo</label><input type="text" id="cat-panstwo" data-category="Państwo" disabled></div>
                            <div class="form-group"><label>🏙️ Miasto</label><input type="text" id="cat-miasto" data-category="Miasto" disabled></div>
                            <div class="form-group"><label>📦 Rzecz</label><input type="text" id="cat-rzecz" data-category="Rzecz" disabled></div>
                            <div class="form-group"><label>🐾 Zwierzę</label><input type="text" id="cat-zwierze" data-category="Zwierzę" disabled></div>
                            <div class="form-group"><label>🌿 Roślina</label><input type="text" id="cat-roslina" data-category="Roślina" disabled></div>
                            <div class="form-group"><label>👤 Imię</label><input type="text" id="cat-imie" data-category="Imię" disabled></div>
                            <div class="form-group"><label>💼 Zawód</label><input type="text" id="cat-zawod" data-category="Zawód" disabled></div>
                        </div>

                        <div class="game-actions">
                            <button type="button" id="btn-draw" onclick="toggleReady()">👍 Gotowy</button>
                            <button type="button" id="btn-stop" onclick="stopGame()" class="danger" disabled>🛑 STOP!</button>
                        </div>
                    </section>

                    <aside class="sidebar" id="chat-sidebar">
                        <div class="sidebar-header">💬 Czat i logi</div>
                        <div id="logs"></div>
                        <div class="chat-input-group">
                            <input type="text" id="message-input" placeholder="Wiadomość...">
                            <button type="button" onclick="sendChat()">Wyślij</button>
                        </div>
                    </aside>

                </div>
            </div>
        </div>
    </main>

    <!-- Floating leave button while in game -->
    <button type="button" id="btn-leave" onclick="leaveRoom()" class="danger" style="display: none;">🚪 Wyjdź</button>

    <!-- Hidden, shared with index.html for socket.js compatibility -->
    <div id="join-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <input type="text" id="room_id" placeholder="KOD">
        </div>
    </div>
    <div id="create-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <select id="max_rounds"><option value="1">1</option><option value="3">3</option><option value="5" selected>5</option></select>
            <select id="time_limit"><option value="60">60</option><option value="90" selected>90</option></select>
        </div>
    </div>
    <div id="lottery-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content text-center">
            <div id="lottery-letter" style="font-size: 6rem; font-weight: 900; color: var(--accent);">?</div>
        </div>
    </div>

    <script src="/static/js/audio.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/game.js"></script>
    <script src="/static/js/socket.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
