<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f2f6ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>Pokój gry | Państwa-Miasta Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/site-footer.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo" style="text-decoration:none;">Państwa<span>Miasta</span></a>
            <div class="nav-links">
                <span id="nav-room-info" class="nav-room-info" style="display: none;">
                    Pokój <strong id="nav-room-code">—</strong>
                </span>
                <a href="/" class="nav-link-extra" id="nav-home-link">Strona główna</a>
                <button type="button" id="btn-leave" onclick="leaveRoom()" class="nav-cta nav-cta--leave" style="display: none;">Wyjdź z pokoju</button>
            </div>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <!-- JOIN STEP -->
            <section id="room-inline-join" class="join-card" style="max-width: 520px; margin: 0 auto;">
                <div class="section-header">
                    <h2>Dołącz do pokoju</h2>
                    <p id="room-inline-label">Pokój: -</p>
                </div>

                <div id="join-section">
                    <div class="form-group play-nickname">
                        <label class="header-label" for="nickname">Pseudonim</label>
                        <div class="nick-field-row">
                            <input type="text" id="nickname" maxlength="20" autocomplete="nickname" inputmode="text">
                            <button type="button" class="nick-reroll secondary" onclick="rerollPlayerNickname()" aria-label="Losuj inny pseudonim">Inny</button>
                        </div>
                    </div>
                    <button type="button" onclick="connect()">DOŁĄCZ DO GRY</button>
                </div>
            </section>

            <!-- GAME STEP -->
            <div id="chat-section" style="display: none;">
                <div class="layout-grid" id="game-layout">

                    <aside class="sidebar" id="scoreboard-sidebar" aria-label="Ranking graczy">
                        <div class="sidebar-header">🏆 Ranking graczy</div>
                        <div class="scoreboard" id="scoreboard"></div>

                        <div id="restart-settings" class="restart-card" style="display: none;">
                            <h3>Zagraj ponownie</h3>
                            <div class="settings-grid">
                                <div>
                                    <label for="restart-rounds">Rundy</label>
                                    <select id="restart-rounds">
                                        <option value="1">1</option>
                                        <option value="3">3</option>
                                        <option value="5" selected>5</option>
                                        <option value="10">10</option>
                                        <option value="22">22 — każda litera raz</option>
                                    </select>
                                </div>
                                <div>
                                    <label for="restart-limit">Czas</label>
                                    <select id="restart-limit">
                                        <option value="60">60</option>
                                        <option value="90" selected>90</option>
                                        <option value="120">120</option>
                                    </select>
                                </div>
                            </div>
                            <div class="restart-buttons">
                                <button type="button" id="btn-restart-game" onclick="requestRestart()" style="display: none;">Nowa gra</button>
                                <button type="button" id="btn-dissolve" onclick="dissolveRoom()" class="danger" style="display: none;">Rozwiąż pokój</button>
                            </div>
                            <div id="game-over-share" class="game-over-share" style="display: none;" aria-live="polite">
                                <p class="game-over-share-title">Udostępnij wynik</p>
                                <p class="game-over-share-hint">Link z podglądem (np. w komunikatorze) jest ważny, dopóki serwer pamięta ten pokój.</p>
                                <div class="game-over-share-actions">
                                    <a class="btn-secondary" id="share-link-anchor" href="#" target="_blank" rel="noopener noreferrer">Karta wyniku</a>
                                    <button type="button" class="btn-secondary" id="btn-copy-share">Kopiuj link</button>
                                    <button type="button" class="btn-secondary" id="btn-native-share" style="display: none;">Udostępnij…</button>
                                </div>
                            </div>
                        </div>
                    </aside>

                    <section class="main-game" id="game-main-area">
                        <header class="game-header">
                            <div>
                                <span class="header-label">Pokój</span>
                                <div id="current-room" style="font-weight:800;"></div>
                            </div>
                            <div class="text-center">
                                <span class="header-label">Litera</span>
                                <div class="letter-display" id="current-letter">?</div>
                            </div>
                            <div style="text-align: right;">
                                <span class="header-label">Czas</span>
                                <div id="round-timer" style="color: var(--warning); font-weight: 800; font-size: 2rem;">--</div>
                            </div>
                        </header>

                        <div class="categories-grid" id="categories">
                            <div class="form-group"><label for="cat-panstwo">🌍 Państwo</label><input type="text" id="cat-panstwo" data-category="Państwo" disabled></div>
                            <div class="form-group"><label for="cat-miasto">🏙️ Miasto</label><input type="text" id="cat-miasto" data-category="Miasto" disabled></div>
                            <div class="form-group"><label for="cat-rzecz">📦 Rzecz</label><input type="text" id="cat-rzecz" data-category="Rzecz" disabled></div>
                            <div class="form-group"><label for="cat-zwierze">🐾 Zwierzę</label><input type="text" id="cat-zwierze" data-category="Zwierzę" disabled></div>
                            <div class="form-group"><label for="cat-roslina">🌿 Roślina <small>(flora: kwiaty, drzewa, owoce, zioła…)</small></label><input type="text" id="cat-roslina" data-category="Roślina" disabled></div>
                            <div class="form-group"><label for="cat-imie">👤 Imię</label><input type="text" id="cat-imie" data-category="Imię" disabled></div>
                            <div class="form-group"><label for="cat-zawod">💼 Zawód</label><input type="text" id="cat-zawod" data-category="Zawód" disabled></div>
                        </div>

                        <div class="game-actions">
                            <button type="button" id="btn-draw" onclick="toggleReady()">👍 Gotowy</button>
                            <button type="button" id="btn-stop" onclick="stopGame()" class="danger" disabled>🛑 STOP!</button>
                        </div>
                    </section>

                    <aside class="sidebar" id="chat-sidebar" aria-label="Czat i logi">
                        <div class="sidebar-header">💬 Czat i logi</div>
                        <div id="logs"></div>
                        <div class="chat-input-group">
                            <input type="text" id="message-input" placeholder="Wiadomość...">
                            <button type="button" onclick="sendChat()">Wyślij</button>
                        </div>
                    </aside>

                </div>
            </div>
        </div>
    </main>

    <!-- SITE_FOOTER -->

    <div id="round-countdown-overlay" class="round-countdown-overlay" hidden aria-hidden="true">
        <div id="round-countdown-num" class="round-countdown-num" role="status" aria-live="assertive"></div>
    </div>

    <!-- Hidden, shared with index.html for socket.js compatibility -->
    <div id="join-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <input type="text" id="room_id" placeholder="KOD">
        </div>
    </div>
    <div id="create-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <select id="max_rounds"><option value="1">1</option><option value="3">3</option><option value="5" selected>5</option><option value="10">10</option><option value="22">22</option></select>
            <select id="time_limit"><option value="60">60</option><option value="90" selected>90</option><option value="120">120</option></select>
            <select id="room_visibility">
                <option value="public" selected>public</option>
                <option value="private">private</option>
            </select>
        </div>
    </div>
    <div id="lottery-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content text-center">
            <div id="lottery-letter" style="font-size: 6rem; font-weight: 900; color: var(--accent);">?</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" integrity="sha384-HAH79XdRvHr6axVGh4xQWVCp14kcd32bNk4Xu0sHDHtFQ42n6BAM8ykvB47dGz6D" crossorigin="anonymous"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/game.js"></script>
    <script src="/static/js/socket.js"></script>
    <script>
        const isLocalDev = ['localhost', '127.0.0.1'].includes(location.hostname);
        if ('serviceWorker' in navigator) {
            if (isLocalDev) {
                navigator.serviceWorker.getRegistrations()
                    .then((regs) => regs.forEach((r) => r.unregister()))
                    .catch(() => {});
            } else {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(() => {});
                });
            }
        }
    </script>
</body>
</html>
