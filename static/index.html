<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Państwa-Miasta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="sticky-timer" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: var(--danger); color: white; padding: 10px; text-align: center; font-size: 1.5rem; z-index: 1000; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        🛑 STOP! Czas: <span id="sticky-time">10</span>s
    </div>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0;">Państwa-Miasta Engine</h1>
            <button id="btn-leave" style="display: none; background: var(--danger); padding: 0.5rem 1rem; width: auto; font-size: 0.9rem;" onclick="window.location.reload()">🚪 Wyjdź</button>
        </div>
        
        <div id="join-section">
            <div class="form-group">
                <label for="nickname">Twój Nick</label>
                <input type="text" id="nickname" placeholder="Wpisz swój nick..." required>
            </div>
            
            <div id="buttons-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <button onclick="createRoom()" style="background-color: var(--accent);">+ Stwórz pokój</button>
                <button onclick="showJoinInputs()" style="background-color: var(--surface); color: var(--primary); border: 2px solid var(--primary);">Dołącz do pokoju</button>
            </div>
            
            <div id="create-settings" style="display: none; border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; background: rgba(0,0,0,0.2);">
                <div style="margin-bottom: 1rem;">
                    <label>Liczba rund:</label>
                    <select id="rounds-input" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 0; outline: none;">
                        <option value="1">1</option>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Limit czasu (sekundy):</label>
                    <select id="limit-input" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 0; outline: none;">
                        <option value="60">60</option>
                        <option value="90" selected>90</option>
                        <option value="120">120</option>
                    </select>
                </div>
                <button onclick="doCreateRoom()" style="background-color: var(--accent);">Zaczynamy!</button>
            </div>

            <div id="join-inputs" style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <div class="form-group">
                    <label for="room_id">ID Pokoju</label>
                    <input type="text" id="room_id" placeholder="np. 1234">
                </div>
                <button onclick="connect()">Wejdź do Gry</button>
            </div>
        </div>

        <div id="chat-section" style="display: none;">
            <div class="layout-grid">
                
                <!-- Kolumna 1: Tabela Wyników -->
                <div class="sidebar" style="border: 2px solid var(--accent); background: rgba(16, 185, 129, 0.05); text-align: center;">
                    <div style="font-weight: 800; font-size: 1.3rem; color: var(--accent); margin-bottom: 1rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; letter-spacing: 1px;">🏆 WYNIKI</div>
                    <div class="scoreboard" id="scoreboard" style="font-size: 1.2rem; text-align: left;">
                        <!-- Wyniki generowane dynamicznie -->
                    </div>
                </div>

                <!-- Kolumna 2: Gra -->
                <div class="main-game">
                    <div class="game-header">
                        <div>
                            <label>Pokój</label>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--text-muted);" id="current-room"></div>
                        </div>
                        <div style="text-align: right;">
                            <label>Gramy na literę</label>
                            <div class="letter-display" id="current-letter">?</div>
                            <div id="round-timer" style="color: var(--warning); font-weight: 600; font-size: 1.2rem; display: none;"></div>
                        </div>
                    </div>

                    <div class="categories-grid" id="categories">
                        <div class="form-group"><label>🌍 Państwo</label><input type="text" data-category="Państwo" disabled></div>
                        <div class="form-group"><label>🏙️ Miasto</label><input type="text" data-category="Miasto" disabled></div>
                        <div class="form-group"><label>📦 Rzecz</label><input type="text" data-category="Rzecz" disabled></div>
                        <div class="form-group"><label>🐾 Zwierzę</label><input type="text" data-category="Zwierzę" disabled></div>
                        <div class="form-group"><label>🌿 Roślina</label><input type="text" data-category="Roślina" disabled></div>
                        <div class="form-group"><label>👤 Imię</label><input type="text" data-category="Imię" disabled></div>
                        <div class="form-group"><label>💼 Zawód</label><input type="text" data-category="Zawód" disabled></div>
                    </div>

                    <div class="action-row">
                        <button id="btn-draw" onclick="toggleReady()" style="background-color: var(--primary);">👍 Gotowy do rundy</button>
                        <button id="btn-stop" onclick="stopGame()" style="background-color: var(--danger);" disabled>⭕ STOP!</button>
                    </div>

                    <div id="restart-settings" style="display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 2px solid var(--accent);">
                        <h3 style="margin-top:0; color: var(--accent); text-align: center; font-weight: 800; font-size: 1.5rem;">Zagraj Ponownie!</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div>
                                <label style="color: var(--text);">Liczba rund:</label>
                                <select id="restart-rounds" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none;">
                                    <option value="1">1</option>
                                    <option value="3">3</option>
                                    <option value="5" selected>5</option>
                                    <option value="10">10</option>
                                </select>
                            </div>
                            <div>
                                <label style="color: var(--text);">Limit czasu (sek):</label>
                                <select id="restart-limit" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none;">
                                    <option value="60">60</option>
                                    <option value="90" selected>90</option>
                                    <option value="120">120</option>
                                </select>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button id="btn-restart-game" onclick="requestRestart()" style="background-color: var(--accent); flex: 2; display: none;">🚀 Nowa Gra!</button>
                            <button id="btn-dissolve" onclick="dissolveRoom()" style="background-color: var(--danger); flex: 1; display: none;">💥 Rozwiąż</button>
                        </div>
                    </div>
                </div>

                <!-- Kolumna 3: Czat & Logi -->
                <div class="sidebar">
                    <label>Czat & Logi</label>
                    <div id="logs" style="height: 350px;"></div>
                    <div class="chat-input-group">
                        <input type="text" id="message-input" placeholder="Napisz wiadomość...">
                        <button onclick="sendChat()">Wyślij</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Skrypty -->
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/game.js"></script>
    <script src="/static/js/socket.js"></script>
    
    <script>
        // Inicjalizacja przy załadowaniu strony
        window.onload = () => {
            const savedNick = localStorage.getItem('pm_nickname');
            if (savedNick) {
                document.getElementById('nickname').value = savedNick;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) {
                document.getElementById('room_id').value = roomFromUrl;
                showJoinInputs();
                document.getElementById('buttons-grid').style.display = 'none';
            }
        };

        // Obsługa Entera na czacie i inputach
        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendChat();
        });
        
        // Dynamiczna obsługa inputów kategorii (zostaje tutaj, bo dotyczy DOMu wygenerowanego statycznie)
        const catInputs = document.querySelectorAll('#categories input');
        catInputs.forEach((inp, i) => {
            inp.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    if(i < catInputs.length - 1) catInputs[i+1].focus();
                    else stopGame(); 
                }
            });
        });
    </script>
</body>
</html>
