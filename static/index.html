<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f2f6ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Państwa-Miasta online — gra w przeglądarce ze znajomymi, bez konta.">
    <link rel="manifest" href="/manifest.json">
    <title>Państwa-Miasta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/site-footer.css">
</head>
<body class="landing-page">
    <nav class="navbar">
        <div class="nav-container nav-container--logo-only">
            <a href="/" class="logo" style="text-decoration:none;">Państwa<span>Miasta</span></a>
        </div>
    </nav>

    <main class="page-wrapper">
        <header class="hero">
            <section id="lobby" class="lobby-section start-panel">
                <div id="join-section" class="join-card">
                    <div id="buttons-grid" class="choice-cards">
                        <button type="button" class="choice-card" onclick="showCreateModal()" aria-label="Stwórz nowy pokój">
                            <span class="choice-icon" aria-hidden="true">✨</span>
                            <span class="choice-content">
                                <span class="choice-title">Stwórz pokój</span>
                                <span class="choice-desc">Ustaw zasady i zostań hostem.</span>
                            </span>
                        </button>
                        <button type="button" class="choice-card" onclick="showJoinModal()" aria-label="Dołącz do istniejącego pokoju">
                            <span class="choice-icon" aria-hidden="true">🔗</span>
                            <span class="choice-content">
                                <span class="choice-title">Dołącz do gry</span>
                                <span class="choice-desc">Wpisz kod od znajomego.</span>
                            </span>
                        </button>
                    </div>

                    <div id="active-rooms-section" class="active-rooms-block" style="display: none;">
                        <h3 class="active-rooms-title">Aktywne pokoje</h3>
                        <div class="table-container">
                            <table class="rooms-table">
                                <thead>
                                    <tr>
                                        <th>Kod</th>
                                        <th>Host</th>
                                        <th>Gracze</th>
                                        <th>Rundy</th>
                                        <th>Czas</th>
                                        <th>Typ</th>
                                        <th>Akcja</th>
                                    </tr>
                                </thead>
                                <tbody id="rooms-list"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </header>
    </main>

    <!-- MODALS -->
    <div id="join-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Dołącz do pokoju</h3>
            <div class="form-group play-nickname">
                <label class="header-label" for="nickname_join">Pseudonim</label>
                <div class="nick-field-row">
                    <input type="text" id="nickname_join" maxlength="20" autocomplete="nickname" inputmode="text">
                    <button type="button" class="nick-reroll secondary" onclick="rerollPlayerNickname()" aria-label="Losuj inny pseudonim">Inny</button>
                </div>
            </div>
            <div class="form-group">
                <input type="text" id="room_id" placeholder="KOD POKOJU" style="text-align:center; font-size:1.4rem; letter-spacing: 0.2em;">
            </div>
            <div class="modal-btns">
                <button class="secondary" onclick="hideModals()">Anuluj</button>
                <button onclick="connect()">Start</button>
            </div>
        </div>
    </div>

    <div id="create-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Nowy pokój</h3>
            <div class="form-group play-nickname">
                <label class="header-label" for="nickname">Pseudonim</label>
                <div class="nick-field-row">
                    <input type="text" id="nickname" maxlength="20" autocomplete="nickname" inputmode="text">
                    <button type="button" class="nick-reroll secondary" onclick="rerollPlayerNickname()" aria-label="Losuj inny pseudonim">Inny</button>
                </div>
            </div>
            <div class="settings-grid">
                <div class="form-group">
                    <label for="max_rounds">Rundy</label>
                    <select id="max_rounds">
                        <option value="1">1</option>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                        <option value="22">22 — każda litera raz</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="time_limit">Czas (s)</label>
                    <select id="time_limit">
                        <option value="60">60</option>
                        <option value="90" selected>90</option>
                        <option value="120">120</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="room_visibility">Widoczność w lobby</label>
                    <select id="room_visibility">
                        <option value="public" selected>Publiczny — widać na liście aktywnych pokoi</option>
                        <option value="private">Prywatny — tylko z linku / kodu</option>
                    </select>
                </div>
            </div>
            <div class="modal-btns">
                <button class="secondary" onclick="hideModals()">Anuluj</button>
                <button onclick="connect()">Stwórz</button>
            </div>
        </div>
    </div>

    <div id="lottery-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content text-center">
            <div id="lottery-letter" style="font-size: 6rem; font-weight: 900; color: var(--accent);">?</div>
        </div>
    </div>

    <button type="button" id="btn-leave" onclick="location.href = '/'" class="danger" style="display: none;">Wyjdź</button>

    <!-- SITE_FOOTER -->

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" integrity="sha384-HAH79XdRvHr6axVGh4xQWVCp14kcd32bNk4Xu0sHDHtFQ42n6BAM8ykvB47dGz6D" crossorigin="anonymous"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/game.js"></script>
    <script src="/static/js/socket.js"></script>
    <script>
        const isLocalDev = ['localhost', '127.0.0.1'].includes(location.hostname)
            || location.hostname.endsWith('.ngrok-free.dev');
        if ('serviceWorker' in navigator) {
            if (isLocalDev) {
                navigator.serviceWorker.getRegistrations()
                    .then((regs) => regs.forEach((r) => r.unregister()))
                    .catch(() => {});
            } else {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(() => {});
                });
            }
        }
    </script>
</body>
</html>
