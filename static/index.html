<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Państwa-Miasta</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #10b981;
            --warning: #f59e0b;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }

        .container { 
            background: var(--surface); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%;
            max-width: 1300px;
            box-sizing: border-box;
        }

        h1 { text-align: center; color: var(--primary); margin-top: 0; font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; }
        
        .layout-grid {
            display: grid;
            grid-template-columns: 250px 2fr 300px;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .layout-grid { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        
        input { 
            padding: 0.8rem 1rem; 
            width: 100%; 
            box-sizing: border-box; 
            border: 2px solid var(--border); 
            border-radius: 8px; 
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem; 
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
        input:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .success-10 { border-color: var(--accent) !important; box-shadow: 0 0 8px rgba(16, 185, 129, 0.6) !important; }
        .warning-5 { border-color: var(--warning) !important; box-shadow: 0 0 8px rgba(245, 158, 11, 0.6) !important; }
        .error-0 { border-color: var(--danger) !important; box-shadow: 0 0 8px rgba(220, 38, 38, 0.6) !important; }

        button { 
            padding: 0.8rem 1.5rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 600; 
            transition: all 0.2s ease; 
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button.danger { background: var(--danger); }
        button.danger:hover:not(:disabled) { background: var(--danger-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .letter-display {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .action-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .sidebar {
            background: var(--bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .scoreboard {
            margin-bottom: 1rem;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .score-item:last-child { border-bottom: none; }
        .score-item strong { color: var(--accent); }

        #logs { 
            border: 2px solid var(--border); 
            padding: 1rem; 
            height: 250px; 
            overflow-y: auto; 
            background: var(--bg); 
            border-radius: 8px; 
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-entry { 
            padding: 0.75rem; 
            border-radius: 6px; 
            background: var(--surface);
            border-left: 4px solid var(--primary);
            animation: fadeIn 0.3s ease;
            font-size: 0.95rem;
        }
        
        .system-msg { border-left-color: var(--warning); color: var(--text-muted); font-style: italic; }
        .results-msg { border-left-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .sender { font-weight: 800; margin-bottom: 0.3rem; color: var(--primary); }

        .chat-input-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .chat-input-group input { flex-grow: 1; }
        .chat-input-group button { width: auto; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="sticky-timer" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: var(--danger); color: white; padding: 10px; text-align: center; font-size: 1.5rem; z-index: 1000; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
        🛑 STOP! Czas: <span id="sticky-time">10</span>s
    </div>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0;">Państwa-Miasta Engine</h1>
            <button id="btn-leave" style="display: none; background: var(--danger); padding: 0.5rem 1rem; width: auto; font-size: 0.9rem;" onclick="window.location.reload()">🚪 Wyjdź</button>
        </div>
        
        <div id="join-section">
            <div class="form-group">
                <label for="nickname">Twój Nick</label>
                <input type="text" id="nickname" placeholder="Wpisz swój nick..." required>
            </div>
            
            <div id="buttons-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                <button onclick="createRoom()" style="background-color: var(--accent);">+ Stwórz pokój</button>
                <button onclick="showJoinInputs()" style="background-color: var(--surface); color: var(--primary); border: 2px solid var(--primary);">Dołącz do pokoju</button>
            </div>
            
            <div id="create-settings" style="display: none; border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; background: rgba(0,0,0,0.2);">
                <div style="margin-bottom: 1rem;">
                    <label>Liczba rund:</label>
                    <select id="rounds-input" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 0; outline: none;">
                        <option value="1">1</option>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Limit czasu (sekundy):</label>
                    <select id="limit-input" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; margin-bottom: 0; outline: none;">
                        <option value="60">60</option>
                        <option value="90" selected>90</option>
                        <option value="120">120</option>
                    </select>
                </div>
                <button onclick="doCreateRoom()" style="background-color: var(--accent);">Zaczynamy!</button>
            </div>

            <div id="join-inputs" style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <div class="form-group">
                    <label for="room_id">ID Pokoju</label>
                    <input type="text" id="room_id" placeholder="np. 1234">
                </div>
                <button onclick="connect()">Wejdź do Gry</button>
            </div>
        </div>

        <div id="chat-section" style="display: none;">
            <div class="layout-grid">
                
                <!-- Kolumna 1: Tabela Wyników -->
                <div class="sidebar" style="border: 2px solid var(--accent); background: rgba(16, 185, 129, 0.05); text-align: center;">
                    <div style="font-weight: 800; font-size: 1.3rem; color: var(--accent); margin-bottom: 1rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem; letter-spacing: 1px;">🏆 WYNIKI</div>
                    <div class="scoreboard" id="scoreboard" style="font-size: 1.2rem; text-align: left;">
                        <!-- Wyniki generowane dynamicznie -->
                    </div>
                </div>

                <!-- Kolumna 2: Gra -->
                <div class="main-game">
                    <div class="game-header">
                        <div>
                            <label>Pokój</label>
                            <div style="font-size: 1.5rem; font-weight: 600; color: var(--text-muted);" id="current-room"></div>
                        </div>
                        <div style="text-align: right;">
                            <label>Gramy na literę</label>
                            <div class="letter-display" id="current-letter">?</div>
                            <div id="round-timer" style="color: var(--warning); font-weight: 600; font-size: 1.2rem; display: none;"></div>
                        </div>
                    </div>

                    <div class="categories-grid" id="categories">
                        <div class="form-group"><label>🌍 Państwo</label><input type="text" data-category="Państwo" disabled></div>
                        <div class="form-group"><label>🏙️ Miasto</label><input type="text" data-category="Miasto" disabled></div>
                        <div class="form-group"><label>📦 Rzecz</label><input type="text" data-category="Rzecz" disabled></div>
                        <div class="form-group"><label>🐾 Zwierzę</label><input type="text" data-category="Zwierzę" disabled></div>
                        <div class="form-group"><label>🌿 Roślina</label><input type="text" data-category="Roślina" disabled></div>
                        <div class="form-group"><label>👤 Imię</label><input type="text" data-category="Imię" disabled></div>
                        <div class="form-group"><label>💼 Zawód</label><input type="text" data-category="Zawód" disabled></div>
                    </div>

                    <div class="action-row">
                        <button id="btn-draw" onclick="toggleReady()" style="background-color: var(--primary);">👍 Gotowy do rundy</button>
                        <button id="btn-stop" onclick="stopGame()" style="background-color: var(--danger);" disabled>⭕ STOP!</button>
                    </div>

                    <div id="restart-settings" style="display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 12px; border: 2px solid var(--accent);">
                        <h3 style="margin-top:0; color: var(--accent); text-align: center; font-weight: 800; font-size: 1.5rem;">Zagraj Ponownie!</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div>
                                <label style="color: var(--text);">Liczba rund:</label>
                                <select id="restart-rounds" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none;">
                                    <option value="1">1</option>
                                    <option value="3">3</option>
                                    <option value="5" selected>5</option>
                                    <option value="10">10</option>
                                </select>
                            </div>
                            <div>
                                <label style="color: var(--text);">Limit czasu (sek):</label>
                                <select id="restart-limit" style="width: 100%; padding: 0.8rem; background: var(--bg); color: var(--text); border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none;">
                                    <option value="60">60</option>
                                    <option value="90" selected>90</option>
                                    <option value="120">120</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="requestRestart()" style="background-color: var(--accent); width: 100%;">🚀 Rozpocznij Nową Grę!</button>
                    </div>
                </div>

                <!-- Kolumna 3: Czat & Logi -->
                <div class="sidebar">
                    <label>Czat & Logi</label>
                    <div id="logs" style="height: 350px;"></div>
                    <div class="chat-input-group">
                        <input type="text" id="message-input" placeholder="Napisz wiadomość...">
                        <button onclick="sendChat()">Wyślij</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let myNick = "";
        
        // Simple Audio Synthesizer
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playGong() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // Odpalane przy załadowaniu strony
        window.onload = () => {
            // Przywróć nick z pamięci przeglądarki
            const savedNick = localStorage.getItem('pm_nickname');
            if (savedNick) {
                document.getElementById('nickname').value = savedNick;
            }

            // Jeśli ktoś wszedł z linku typu ?room=1234
            const urlParams = new URLSearchParams(window.location.search);
            const roomFromUrl = urlParams.get('room');
            if (roomFromUrl) {
                document.getElementById('room_id').value = roomFromUrl;
                showJoinInputs();
                // Ukryjemy przyciski wyboru "Stwórz/Dołącz", bo wiemy że chce dołączyć
                document.getElementById('buttons-grid').style.display = 'none';
            }
        };

        function addLog(htmlContent, typeClass) {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${typeClass}`;
            entry.innerHTML = htmlContent;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function updateScoreboard(scores) {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            // Sortujemy malejąco po wynikach
            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
            
            sorted.forEach(([player, score]) => {
                const div = document.createElement('div');
                div.className = 'score-item';
                div.innerHTML = `<span>${player}</span> <strong>${score} pkt</strong>`;
                sb.appendChild(div);
            });
        }

        function showJoinInputs() {
            document.getElementById('join-inputs').style.display = 'block';
        }

        function createRoom() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return alert('Proszę najpierw podać swój nick!');
            
            document.getElementById('buttons-grid').style.display = 'none';
            document.getElementById('create-settings').style.display = 'block';
        }

        function doCreateRoom() {
            const randomCode = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room_id').value = randomCode;
            window.roomRounds = document.getElementById('rounds-input').value || 5;
            window.roomLimit = document.getElementById('limit-input').value || 90;
            connect();
        }

        function connect() {
            initAudio();
            myNick = document.getElementById('nickname').value.trim();
            const roomId = document.getElementById('room_id').value.trim();

            if (!myNick || !roomId) return alert('Proszę podać nick i upewnić się, że masz ID pokoju.');

            // Zapisz na przyszłość
            localStorage.setItem('pm_nickname', myNick);
            
            // Podmień URL żeby łatwo było go skopiować i wysłać znajomym!
            window.history.replaceState(null, '', `?room=${roomId}`);

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            let wsUrl = `${protocol}//${window.location.host}/ws/${roomId}/${myNick}`;
            
            if (window.roomRounds && window.roomLimit) {
                wsUrl += `?rounds=${window.roomRounds}&limit=${window.roomLimit}`;
            }
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('join-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                document.getElementById('btn-leave').style.display = 'block';
                document.getElementById('current-room').textContent = roomId;
            };

            ws.onclose = (e) => {
                if (e.code === 1008) {
                    alert('Nick jest już zajęty lub nieprawidłowy!');
                    return;
                }
                
                // Automatyczny reconnect (np. po wyjściu z Safari/Chrome na telefonie)
                addLog(`<em>Utracono połączenie. Próba wznowienia za 2 sekundy...</em>`, "system-msg");
                setTimeout(() => {
                    // Ponawiamy próbę łączenia bez resetowania wpisanych haseł
                    if (document.getElementById('chat-section').style.display !== 'none') {
                        connect();
                    }
                }, 2000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === "system") {
                    addLog(`<em>${msg.message}</em>`, "system-msg");
                } 
                else if (msg.type === "score_update") {
                    updateScoreboard(msg.scores);
                }
                else if (msg.type === "chat") {
                    addLog(`<div class="sender">${msg.sender}</div><div>${msg.text}</div>`, "");
                }
                else if (msg.type === "round_started") {
                    window.currentLetter = msg.letter;
                    document.getElementById("current-letter").textContent = msg.letter;
                    // Reset statusu przycisku po starcie
                    const btn = document.getElementById("btn-draw");
                    btn.classList.remove('ready');
                    btn.style.display = 'none';
                    
                    addLog(`<em>Gra rozpoczęta! Litera: <strong>${msg.letter}</strong> (Runda ${msg.current_round}/${msg.max_rounds}). Limit czasu: ${msg.time_limit}s</em>`, "system-msg");
                    enableInputs();
                    
                    // Włącz globalny timer
                    let timeLeft = msg.time_limit;
                    document.getElementById("round-timer").textContent = timeLeft + "s";
                    document.getElementById("round-timer").style.display = "block";
                    
                    window.globalRoundTimer = setInterval(() => {
                        timeLeft--;
                        if (timeLeft >= 0) {
                            document.getElementById("round-timer").textContent = timeLeft + "s";
                        }
                    }, 1000);
                }
                else if (msg.type === "stop_round") {
                    playGong();
                    if (window.globalRoundTimer) clearInterval(window.globalRoundTimer);
                    document.getElementById("round-timer").style.display = "none";
                    
                    addLog(`<em>🚨 <strong>${msg.sender} zatrzymał rundę!</strong> Oczekiwanie na przesłanie odpowiedzi... Masz 10 sekund!</em>`, "system-msg");
                    
                    // Zablokuj przycisk STOP dla wszystkich
                    const btnStop = document.getElementById('btn-stop');
                    btnStop.disabled = true;
                    
                    // Pokazujemy fixed banner na górze (idealne na mobilki)
                    const stickyTimer = document.getElementById('sticky-timer');
                    const stickyTime = document.getElementById('sticky-time');
                    if (stickyTimer) {
                        stickyTimer.style.display = 'block';
                        stickyTime.innerText = '10';
                    }
                    
                    // Pokazujemy wielki odliczacz na środku ekranu oraz na przycisku STOP
                    document.getElementById('current-letter').innerHTML = `<span style="color:var(--danger)">10s</span>`;
                    btnStop.innerHTML = `⏳ 10s`;
                    
                    let timeLeft = 10;
                    const countdownInterval = setInterval(() => {
                        timeLeft--;
                        if(timeLeft > 0) {
                            document.getElementById('current-letter').innerHTML = `<span style="color:var(--danger)">${timeLeft}s</span>`;
                            btnStop.innerHTML = `⏳ ${timeLeft}s`;
                            if (stickyTime) stickyTime.innerText = timeLeft;
                            playTick();
                        } else {
                            clearInterval(countdownInterval);
                            btnStop.innerHTML = `WYSYŁANIE...`;
                            if (stickyTimer) stickyTimer.style.display = 'none';
                            disableAndSubmit();
                        }
                    }, 1000);
                    
                    // Zapisujemy ID intervalu do window, żeby można go było wyczyścić przy ew. ręcznym wyjściu
                    window.currentCountdown = countdownInterval;
                }
                else if (msg.type === "round_results") {
                    if(window.currentCountdown) clearInterval(window.currentCountdown);
                    if(window.globalRoundTimer) clearInterval(window.globalRoundTimer);
                    document.getElementById("round-timer").style.display = "none";
                    
                    let html = `<div class="sender">Wyniki Rundy:</div>`;
                    
                    // Pokazujemy ile kto dostał punktów w tej rundzie
                    for (const [player, rScore] of Object.entries(msg.round_scores)) {
                        html += `<div style="margin-bottom: 0.5rem"><strong>${player}: +${rScore.total} pkt</strong><br>`;
                        const pAnswers = msg.answers[player] || {};
                        for (const [cat, val] of Object.entries(pAnswers)) {
                            if(val) {
                                const pts = rScore.details[cat] || 0;
                                let color = "var(--text-muted)";
                                if (pts === 10) color = "var(--accent)";
                                else if (pts === 5) color = "var(--warning)";
                                else color = "var(--danger)";
                                html += `<span style="font-size:0.8em; color:${color};">${cat}:</span> ${val} `;
                            }
                        }
                        html += `</div>`;
                        
                        // Kolorowanie własnych inputów
                        if (player === myNick) {
                            const inputs = document.querySelectorAll('#categories input');
                            inputs.forEach(inp => {
                                const cat = inp.dataset.category;
                                const pts = rScore.details[cat];
                                inp.classList.remove('success-10', 'warning-5', 'error-0');
                                if(pts === 10) inp.classList.add('success-10');
                                else if(pts === 5) inp.classList.add('warning-5');
                                else inp.classList.add('error-0');
                            });
                        }
                    }
                    
                    addLog(html, "results-msg");
                    updateScoreboard(msg.total_scores);
                    
                    if (msg.game_over) {
                        html += `<div style="margin-top:1rem; font-weight:800; color:var(--danger); text-align:center;">🏁 Koniec Gry! Zwycięzca został wyłoniony!</div>`;
                        document.getElementById('btn-draw').style.display = 'none';
                        document.getElementById('restart-settings').style.display = 'block';
                        confetti({ particleCount: 150, spread: 100, origin: { y: 0.3 } });
                        setTimeout(() => confetti({ particleCount: 150, spread: 120, origin: { y: 0.4 } }), 1000);
                    } else {
                        const btn = document.getElementById('btn-draw');
                        btn.classList.remove('ready');
                        btn.innerHTML = '👍 Gotowy do rundy';
                        btn.style.backgroundColor = 'var(--primary)';
                        btn.style.display = 'block';
                    }
                }
                else if (msg.type === "game_restarted") {
                    document.getElementById('restart-settings').style.display = 'none';
                    const btn = document.getElementById('btn-draw');
                    btn.style.display = 'inline-block';
                    btn.classList.remove('ready');
                    btn.innerHTML = '👍 Gotowy do rundy';
                    btn.style.backgroundColor = 'var(--primary)';
                    
                    document.getElementById('current-letter').innerHTML = '?';
                    updateScoreboard(msg.scores);
                    
                    const inputs = document.querySelectorAll('#categories input');
                    inputs.forEach(inp => {
                        inp.value = '';
                        inp.disabled = true;
                        inp.classList.remove('error', 'success-10', 'warning-5', 'error-0');
                    });
                    
                    addLog(`<em>Gospodarz <strong>${msg.sender}</strong> zrestartował grę z nowymi ustawieniami! Wyniki zostały wyzerowane.</em>`, "system-msg");
                }
            };

            ws.onerror = () => {
                if(e.code === 1008) alert('Nick zajęty!');
                window.location.reload();
            };
        }

        function sendJson(obj) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
        }

        function sendChat() {
            const input = document.getElementById('message-input');
            if (input.value.trim()) {
                sendJson({ type: "chat", text: input.value.trim() });
                input.value = '';
            }
        }

        function toggleReady() {
            const btn = document.getElementById('btn-draw');
            if (btn.classList.contains('ready')) {
                btn.classList.remove('ready');
                btn.innerHTML = '👍 Gotowy do rundy';
                btn.style.backgroundColor = 'var(--primary)';
                sendJson({ type: "not_ready" });
            } else {
                btn.classList.add('ready');
                btn.innerHTML = '⏳ Czekamy na resztę...';
                btn.style.backgroundColor = 'var(--accent)';
                sendJson({ type: "ready" });
            }
        }

        function stopGame() {
            const stopBtn = document.getElementById('btn-stop');
            stopBtn.setAttribute('data-stopped', 'true');
            stopBtn.disabled = true;
            
            // Natychmiastowe wysłanie swoich wyników jak się wciśnie STOP
            sendJson({ type: "stop" });
            disableAndSubmit();
        }

        function requestRestart() {
            const rounds = parseInt(document.getElementById('restart-rounds').value) || 5;
            const limit = parseInt(document.getElementById('restart-limit').value) || 90;
            sendJson({
                type: "restart_game",
                rounds: rounds,
                limit: limit
            });
            document.getElementById('restart-settings').style.display = 'none';
        }

        function enableInputs() {
            if(window.currentCountdown) clearInterval(window.currentCountdown);
            const inputs = document.querySelectorAll('#categories input');
            inputs.forEach(inp => {
                inp.disabled = false;
                inp.value = '';
                inp.classList.remove('error', 'success-10', 'warning-5', 'error-0'); 
                inp.style.borderColor = '';
                
                // Remove stare listenery, żeby się nie duplikowały
                const clone = inp.cloneNode(true);
                inp.parentNode.replaceChild(clone, inp);
            });
            
            // Ponownie łapiemy, bo zrobiliśmy cloneNode
            const newInputs = document.querySelectorAll('#categories input');
            newInputs.forEach((inp, i) => {
                inp.addEventListener('input', (e) => {
                    checkAllFilled();
                    validateFirstLetter(e.target);
                });
                
                // Zgłaszaj odpowiedzi Enterem
                inp.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                        if(i < newInputs.length - 1) newInputs[i+1].focus();
                        else {
                            const stopBtn = document.getElementById('btn-stop');
                            if(!stopBtn.disabled) stopGame(); // Ostatni input i enter = STOP!
                        }
                    }
                });
            });
            
            const btnStop = document.getElementById('btn-stop');
            btnStop.disabled = true;
            btnStop.removeAttribute('data-stopped');
            btnStop.innerHTML = '🛑 STOP!';
            
            // Przywracamy literę jeśli zniknęła
            if(window.currentLetter) {
                document.getElementById('current-letter').innerHTML = window.currentLetter;
            }
        }

        function checkAllFilled() {
            const inputs = Array.from(document.querySelectorAll('#categories input'));
            const allFilled = inputs.every(inp => inp.value.trim().length > 0);
            const stopBtn = document.getElementById('btn-stop');
            
            if (allFilled && !stopBtn.hasAttribute('data-stopped')) {
                stopBtn.disabled = false;
            } else {
                stopBtn.disabled = true;
            }
        }

        function validateFirstLetter(inp) {
            if (!window.currentLetter) return;
            const val = inp.value.trim();
            if (val.length > 0 && val[0].toUpperCase() !== window.currentLetter) {
                inp.style.borderColor = 'var(--danger)';
            } else {
                inp.style.borderColor = ''; 
            }
        }

        function disableAndSubmit() {
            const inputs = document.querySelectorAll('#categories input');
            let answers = {};
            inputs.forEach(inp => {
                answers[inp.dataset.category] = inp.value.trim();
                inp.disabled = true;
            });
            
            document.getElementById('btn-stop').disabled = true;
            sendJson({ type: "answers", answers: answers });
        }

        document.getElementById('message-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendChat();
        });
        
        // Zgłaszaj odpowiedzi Enterem
        const catInputs = document.querySelectorAll('#categories input');
        catInputs.forEach((inp, i) => {
            inp.addEventListener('keypress', e => {
                if (e.key === 'Enter') {
                    if(i < catInputs.length - 1) catInputs[i+1].focus();
                    else stopGame(); // Ostatni input i enter = STOP!
                }
            });
        });
    </script>
</body>
</html>
