        <style>
            .slownik-hero {
                text-align: center;
                padding: 2rem 1rem 1rem;
            }
            .slownik-hero h1 {
                font-size: clamp(1.8rem, 5vw, 2.5rem);
                margin: 0 0 0.5rem;
            }
            .slownik-hero p {
                color: var(--text-muted);
                max-width: 32rem;
                margin: 0 auto 1.5rem;
            }
            .category-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.75rem;
                max-width: 720px;
                margin: 0 auto 2rem;
                padding: 0 1rem;
            }
            .category-card {
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                padding: 1rem;
                text-align: center;
                background: var(--surface-0);
                cursor: pointer;
                transition: transform 0.15s;
                text-decoration: none;
                color: inherit;
                display: block;
            }
            .category-card:hover {
                transform: translateY(-2px);
                border-color: var(--accent);
            }
            .category-card.active {
                border-color: var(--accent);
                background: rgba(14, 165, 233, 0.08);
            }
            .category-icon {
                font-size: 1.8rem;
                display: block;
                margin-bottom: 0.25rem;
            }
            .category-name {
                font-weight: 800;
                font-size: 1rem;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .category-count {
                font-size: 0.75rem;
                color: var(--text-muted);
            }
            .letter-nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
                justify-content: center;
                max-width: 720px;
                margin: 0 auto 1rem;
                padding: 0 1rem;
            }
            .letter-btn {
                width: 2.5rem;
                height: 2.5rem;
                border-radius: var(--r-sm);
                border: 1px solid var(--border);
                background: var(--surface-0);
                font-weight: 700;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.15s;
                padding: 0;
                min-height: auto;
                color: var(--text);
                text-transform: none;
                letter-spacing: 0;
            }
            .letter-btn:hover,
            .letter-btn.active {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .words-container {
                max-width: 720px;
                margin: 0 auto 3rem;
                padding: 0 1rem;
            }
            .words-section h3 {
                font-size: 1.1rem;
                margin: 0 0 0.75rem;
                color: var(--accent);
            }
            .words-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
            }
            .word-chip {
                padding: 0.3rem 0.6rem;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--surface-0);
                font-size: 0.85rem;
                cursor: default;
            }
            .word-chip:hover {
                background: rgba(14, 165, 233, 0.08);
            }
            .slownik-category-desc {
                max-width: 720px;
                margin: 0 auto 1.5rem;
                padding: 0 1rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9rem;
                line-height: 1.5;
            }
            .empty-state {
                text-align: center;
                padding: 3rem 1rem;
                color: var(--text-muted);
            }
            .loading {
                text-align: center;
                padding: 2rem;
                color: var(--text-muted);
            }

            /* --- Wyszukiwarka (centralnie pod literami) --- */
            .slownik-search {
                max-width: 560px;
                margin: 0 auto 1rem;
                padding: 0 1rem;
            }
            .slownik-search-row {
                display: flex;
                gap: 0.5rem;
                align-items: stretch;
                background: var(--surface-0);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 0.35rem;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
                transition: border-color 0.15s;
            }
            .slownik-search-row:focus-within {
                border-color: var(--accent);
            }
            .slownik-search-input {
                flex: 1;
                border: 0;
                background: transparent;
                font-size: 0.95rem;
                padding: 0.4rem 0.25rem;
                outline: none;
                color: var(--text);
                min-width: 0;
            }
            .slownik-search-input::placeholder {
                color: var(--text-muted);
                opacity: 0.7;
            }
            .slownik-search-clear {
                border: 0;
                background: transparent;
                font-size: 1.2rem;
                cursor: pointer;
                color: var(--text-muted);
                padding: 0 0.5rem;
                display: flex;
                align-items: center;
            }
            .slownik-search-clear:hover {
                color: var(--text);
            }
            .slownik-search-cat-label {
                font-size: 1.15rem;
                display: flex;
                align-items: center;
                padding: 0 0.25rem 0 0.5rem;
            }

            /* --- Tabela dla imion --- */
            .slownik-table-wrap {
                overflow-x: auto;
                margin-top: 0.5rem;
            }
            .slownik-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.9rem;
            }
            .slownik-table th {
                text-align: left;
                padding: 0.5rem 0.75rem;
                font-weight: 700;
                color: var(--text-muted);
                font-size: 0.8rem;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                border-bottom: 1px solid var(--border);
            }
            .slownik-table td {
                padding: 0.45rem 0.75rem;
                border-bottom: 1px solid var(--border);
            }
            .slownik-td-name {
                font-weight: 600;
            }
            .slownik-td-gender {
                color: var(--text-muted);
            }
            .slownik-td-count {
                text-align: right;
                font-variant-numeric: tabular-nums;
                color: var(--accent);
                font-weight: 700;
            }
            .slownik-table tr:last-child td {
                border-bottom: 0;
            }
            .slownik-table tr:hover td {
                background: rgba(14, 165, 233, 0.04);
            }

            /* --- Paginacja --- */
            .slownik-pagination {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.75rem;
                margin-top: 1rem;
                flex-wrap: wrap;
            }
            .slownik-page-btn {
                border: 1px solid var(--border);
                background: var(--surface-0);
                border-radius: 10px;
                padding: 0.4rem 0.9rem;
                font-size: 0.85rem;
                cursor: pointer;
                color: var(--text);
                min-height: 36px;
                transition: all 0.12s;
            }
            .slownik-page-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }
            .slownik-page-info {
                font-size: 0.85rem;
                color: var(--text-muted);
            }
            @media (max-width: 480px) {
                .category-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
                .category-name {
                    font-size: 0.85rem;
                }
            }
        </style>
    </head>

        <script>
            const CATEGORIES = [
                { id: "miasta", name: "Miasta", icon: "🏙️" },
                { id: "panstwa", name: "Państwa", icon: "🌍" },
                { id: "rosliny", name: "Rośliny", icon: "🌿" },
                { id: "zwierzeta", name: "Zwierzęta", icon: "🐾" },
                { id: "imiona", name: "Imiona", icon: "👤" },
                { id: "zawody", name: "Zawody", icon: "💼" },
                { id: "rzeczy", name: "Rzeczy", icon: "📦" },
            ];
            const LETTERS = "ABCDEFGHIJKLMNOPRSTUWZ".split("");
            let activeCategory = null;
            let activeLetter = null;
            let searchTimer = null;
            let currentPage = 1;
            let searchActive = false; // true gdy search input ma tekst

            /* --- Pre-renderowane dane (wstrzyknięte przez backend) --- */
            const slownikDataScript = document.getElementById("slownik-data");
            const SLOWNIK_WORDS = slownikDataScript
                ? JSON.parse(slownikDataScript.textContent)
                : {};
            const SLOWNIK_COUNTS = {};
            for (var cid in SLOWNIK_WORDS) {
                var total = 0;
                var ld = SLOWNIK_WORDS[cid];
                for (var l in ld) {
                    total += ld[l].length;
                }
                SLOWNIK_COUNTS[cid] = total;
            }

            function escapeHtml(s) {
                var d = document.createElement("div");
                d.appendChild(document.createTextNode(s));
                return d.innerHTML;
            }

            /* --- DOM refs --- */
            const searchInput = document.getElementById("search-input");
            const searchCatLabel = document.getElementById("search-cat-label");
            const searchSection = document.getElementById("slownik-search-section");
            const searchClear = document.getElementById("search-clear-btn");
            const wordsContainer = document.getElementById("words-container");

            const CATEGORY_ICONS = {
                miasta: "🏙️", panstwa: "🌍", rosliny: "🌿",
                zwierzeta: "🐾", zawody: "💼", imiona: "👤", rzeczy: "📦",
            };

            const TABLE_COLUMNS = {
                imiona: [
                    { key: "name", label: "Imię", tdClass: "slownik-td-name" },
                    { key: "gender", label: "Płeć", tdClass: "slownik-td-gender",
                      format: (v) => v === "M" ? "Mężczyzna" : v === "K" ? "Kobieta" : v },
                    { key: "count", label: "Liczba wystąpień", tdClass: "slownik-td-count",
                      format: (v) => Number(v).toLocaleString() },
                ],
                panstwa: [
                    { key: "name", label: "Państwo", tdClass: "slownik-td-name" },
                    { key: "continent", label: "Kontynent", tdClass: "slownik-td-gender" },
                    { key: "capital", label: "Stolica", tdClass: "slownik-td-gender" },
                    { key: "population", label: "Populacja", tdClass: "slownik-td-count",
                      format: (v) => (v ? Number(v).toLocaleString() : "—") },
                    { key: "area_km2", label: "Pow. km²", tdClass: "slownik-td-count",
                      format: (v) => (v ? Number(v).toLocaleString() : "—") },
                ],
                miasta: [
                    { key: "name", label: "Miasto", tdClass: "slownik-td-name" },
                    { key: "country", label: "Kraj", tdClass: "slownik-td-gender" },
                ],
                zawody: [
                    { key: "name", label: "Zawód", tdClass: "slownik-td-name" },
                    { key: "code", label: "Kod PKD", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                ],
                rosliny: [
                    { key: "name", label: "Roślina", tdClass: "slownik-td-name" },
                    { key: "latin", label: "Nazwa łacińska", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                    { key: "family", label: "Rodzina", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                    { key: "genus", label: "Rodzaj", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                ],
                zwierzeta: [
                    { key: "name", label: "Zwierzę", tdClass: "slownik-td-name" },
                    { key: "latin", label: "Nazwa łacińska", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                    { key: "family", label: "Rodzina", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                    { key: "genus", label: "Rodzaj", tdClass: "slownik-td-gender",
                      format: (v) => v || "—" },
                ],
                rzeczy: [
                    { key: "name", label: "Rzecz", tdClass: "slownik-td-name" },
                ],
            };

            function renderStructuredTable(data, columns) {
                var html = '<div class="slownik-table-wrap"><table class="slownik-table"><thead><tr>';
                columns.forEach(function (col) { html += "<th>" + col.label + "</th>"; });
                html += "</tr></thead><tbody>";
                data.words.forEach(function (w) {
                    html += "<tr>";
                    columns.forEach(function (col) {
                        var val = w[col.key];
                        if (col.format) val = col.format(val);
                        html += '<td class="' + (col.tdClass || "") + '">' + escapeHtml(String(val ?? "")) + "</td>";
                    });
                    html += "</tr>";
                });
                html += "</tbody></table></div>";
                html += renderPagination(data);
                return html;
            }

            function renderSearchChips(data) {
                var html = '<div class="words-grid">';
                data.words.forEach(function (w) {
                    html += '<span class="word-chip">' + (typeof w === "string" ? w : w.name || w) + "</span>";
                });
                html += "</div>";
                html += renderPagination(data);
                return html;
            }

            function renderPagination(data) {
                if (data.pages <= 1) return "";
                var html = '<div class="slownik-pagination">';
                if (data.page > 1) {
                    html += '<button class="slownik-page-btn" onclick="goToPage(' + (data.page - 1) + ')">‹ Poprzednia</button>';
                }
                html += '<span class="slownik-page-info">Strona ' + data.page + " z " + data.pages + " (" + data.total.toLocaleString() + " wyników)</span>";
                if (data.page < data.pages) {
                    html += '<button class="slownik-page-btn" onclick="goToPage(' + (data.page + 1) + ')">Następna ›</button>';
                }
                html += "</div>";
                return html;
            }

            function goToPage(page) {
                currentPage = page;
                doSearch();
            }

            /* --- Search (API) — modyfikuje words-container --- */
            async function doSearch() {
                const q = searchInput.value.trim();
                if (!q) {
                    // Wycofaj search → przywroc wyniki litery
                    searchActive = false;
                    searchClear.style.display = "none";
                    if (activeCategory && activeLetter) {
                        renderWordsFromData(activeCategory, activeLetter);
                    }
                    return;
                }
                searchActive = true;
                searchClear.style.display = "";
                wordsContainer.innerHTML = '<p class="loading">Szukanie…</p>';
                try {
                    const url = `/api/dictionary/slownik/search?q=${encodeURIComponent(q)}&category=${encodeURIComponent(activeCategory)}&letter=${encodeURIComponent(activeLetter)}&page=${currentPage}&per_page=10`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.words.length === 0) {
                        wordsContainer.innerHTML = '<p class="empty-state">Brak wyników dla <strong>' + escapeHtml(q) + '</strong> w tej kategorii na literę ' + activeLetter.toUpperCase() + '.</p>';
                    } else if (data.structured) {
                        var cols = TABLE_COLUMNS[data.category];
                        wordsContainer.innerHTML = cols ? renderStructuredTable(data, cols) : renderSearchChips(data);
                    } else {
                        wordsContainer.innerHTML = renderSearchChips(data);
                    }
                } catch (e) {
                    wordsContainer.innerHTML = '<p class="empty-state">Błąd wyszukiwania</p>';
                }
            }

            searchInput.addEventListener("input", function () {
                clearTimeout(searchTimer);
                currentPage = 1;
                searchTimer = setTimeout(doSearch, 200);
            });
            searchInput.addEventListener("search", function () {
                currentPage = 1;
                doSearch();
            });
            searchClear.addEventListener("click", function () {
                searchInput.value = "";
                searchActive = false;
                searchClear.style.display = "none";
                currentPage = 1;
                if (activeCategory && activeLetter) {
                    renderWordsFromData(activeCategory, activeLetter);
                }
                searchInput.focus();
            });

            /* --- Kategorie (z pre-renderowanych danych) --- */
            function loadCategories() {
                const grid = document.getElementById("categories");
                grid.innerHTML = CATEGORIES.map(
                    (c) => `
                <button class="category-card" data-cat="${c.id}" onclick="selectCategory('${c.id}')">
                    <span class="category-icon">${c.icon}</span>
                    <span class="category-name">${c.name}</span>
                    <span class="category-count">${(SLOWNIK_COUNTS[c.id] || 0).toLocaleString()} słów</span>
                </button>`,
                ).join("");
            }

            var CATEGORY_DESCRIPTIONS = {
                miasta: "Miasta — ponad 32 tysiące miejscowości z Polski i świata, od małych wsi po wielkie metropolie.",
                panstwa: "Państwa — 205 krajów i terytoriów z całego świata. Dla każdego znajdziesz kontynent, stolicę, populację i powierzchnię.",
                rosliny: "Rośliny — kwiaty, drzewa, krzewy, owoce, warzywa, zioła i grzyby. Około 19 tysięcy haseł.",
                zwierzeta: "Zwierzęta — ssaki, ptaki, gady, płazy, ryby i owady. Około 10 tysięcy gatunków.",
                zawody: "Zawody — profesje i role społeczne, od tradycyjnych rzemieślników po nowoczesne specjalizacje.",
                imiona: "Imiona — żeńskie, męskie i zdrobnienia. Popularne i rzadkie imiona z różnych krajów.",
                rzeczy: "Rzeczy — przedmioty codziennego użytku, narzędzia, ubrania, meble, elektronika. Ponad 5 tysięcy haseł.",
            };

            function showCategoryDescription(cat) {
                var descEl = document.getElementById("category-description");
                var textEl = document.getElementById("category-desc-text");
                if (descEl && textEl && CATEGORY_DESCRIPTIONS[cat]) {
                    textEl.textContent = CATEGORY_DESCRIPTIONS[cat];
                    descEl.style.display = "";
                } else if (descEl) {
                    descEl.style.display = "none";
                }
            }

            function renderLetters() {
                const nav = document.getElementById("letters");
                nav.innerHTML = LETTERS.map((l) =>
                    `<button class="letter-btn" data-letter="${l}" onclick="selectLetter('${l}')">${l}</button>`
                ).join("");
                nav.style.display = activeCategory ? "flex" : "none";
            }

            /* --- Wyświetlanie słów z pre-renderowanych danych --- */
            function renderWordsFromData(cat, letter) {
                const sectionId = "dict-" + cat + "-" + letter.toLowerCase();
                const section = document.getElementById(sectionId);
                const container = document.getElementById("words-container");
                if (section) {
                    // Clone bez hidden — zachowujemy oryginal do ponownego użycia
                    const clone = section.cloneNode(true);
                    clone.removeAttribute("hidden");
                    container.innerHTML = "";
                    container.appendChild(clone);
                    return;
                }
                container.innerHTML = '<p class="empty-state">Brak słów na ' + letter.toUpperCase() + ' w kategorii ' + CATEGORIES.find(c => c.id === cat)?.name + '.</p>';
            }

            function updateHash(cat, letter) {
                if (cat && letter) {
                    history.replaceState(null, "", "/slownik#" + cat + "/" + letter.toLowerCase());
                } else if (cat) {
                    history.replaceState(null, "", "/slownik#" + cat);
                } else {
                    history.replaceState(null, "", "/slownik");
                }
            }

            function selectCategory(cat) {
                activeCategory = cat;
                activeLetter = null;
                currentPage = 1;
                searchActive = false;

                document.querySelectorAll(".category-card").forEach((c) =>
                    c.classList.toggle("active", c.dataset.cat === cat));

                // Search schowany — pojawi sie dopiero po wybraniu litery
                searchSection.style.display = "none";
                searchCatLabel.textContent = CATEGORY_ICONS[cat] || "🌿";
                searchInput.placeholder = "Wpisz nazwę " + (CATEGORIES.find((c) => c.id === cat)?.name || "").toLowerCase() + "…";
                searchInput.value = "";
                searchClear.style.display = "none";

                renderLetters();
                showCategoryDescription(cat);

                // Główny kontener: wyświetl wszystkie slowa dla tej kategorii
                const allWords = SLOWNIK_WORDS[cat];
                if (allWords) {
                    var total = 0;
                    for (var l in allWords) total += allWords[l].length;
                    wordsContainer.innerHTML = '<p class="slownik-category-desc" style="text-align:center;color:var(--text-muted);font-size:0.9rem">' +
                        total.toLocaleString() + ' słów. Wybierz literę powyżej, żeby filtrować.</p>';
                } else {
                    wordsContainer.innerHTML = '<p class="empty-state">Brak danych</p>';
                }
                updateHash(cat, null);
            }

            function selectLetter(letter) {
                activeLetter = letter;
                searchActive = false;
                document.querySelectorAll(".letter-btn").forEach((b) =>
                    b.classList.toggle("active", b.dataset.letter === letter));

                // Pokaż search pod literami, wyczyść poprzedni
                searchSection.style.display = "";
                searchInput.value = "";
                searchClear.style.display = "none";

                // Pre-renderowane dane w głównym kontenerze
                renderWordsFromData(activeCategory, letter);
                updateHash(activeCategory, letter);
            }

            /* --- Hash routing: /slownik#miasta/a → nawiguj --- */
            function navigateFromHash() {
                var hash = window.location.hash.replace(/^#/, "");
                if (!hash) return;
                var parts = hash.split("/");
                var cat = parts[0];
                var letter = parts.length > 1 ? parts[1] : null;
                if (!cat) return;
                // Znajdź kategorię
                var match = CATEGORIES.find(function (c) { return c.id === cat; });
                if (!match) return;
                selectCategory(cat);
                if (letter) {
                    // Znajdź literę
                    var upper = letter.toUpperCase();
                    if (LETTERS.indexOf(upper) !== -1) {
                        selectLetter(upper);
                    }
                }
            }

            /* --- Init --- */
            loadCategories();
            renderLetters();
            // Obsłuż hash na starcie (jeśli user wszedł z linku /slownik#miasta/a)
            navigateFromHash();

            /* --- Nasłuchuj zmian hasha (przycisk wstecz/dalej) --- */
            window.addEventListener("hashchange", navigateFromHash);
        </script>
    </body>
</html>
