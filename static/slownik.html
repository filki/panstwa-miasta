        <script type="application/ld+json">

            onload="this.media = 'all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"

        <style>
            .slownik-hero {
                text-align: center;
                padding: 2rem 1rem 1rem;
            }
            .slownik-hero h1 {
                font-size: clamp(1.8rem, 5vw, 2.5rem);
                margin: 0 0 0.5rem;
            }
            .slownik-hero p {
                color: var(--text-muted);
                max-width: 32rem;
                margin: 0 auto 1.5rem;
            }
            .category-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 0.75rem;
                max-width: 720px;
                margin: 0 auto 2rem;
                padding: 0 1rem;
            }
            .category-card {
                border: 1px solid var(--border);
                border-radius: var(--r-lg);
                padding: 1rem;
                text-align: center;
                background: var(--surface-0);
                cursor: pointer;
                transition: transform 0.15s;
                text-decoration: none;
                color: inherit;
                display: block;
            }
            .category-card:hover {
                transform: translateY(-2px);
                border-color: var(--accent);
            }
            .category-card.active {
                border-color: var(--accent);
                background: rgba(14, 165, 233, 0.08);
            }
            .category-icon {
                font-size: 1.8rem;
                display: block;
                margin-bottom: 0.25rem;
            }
            .category-name {
                font-weight: 800;
                font-size: 1rem;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .category-count {
                font-size: 0.75rem;
                color: var(--text-muted);
            }
            .letter-nav {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
                justify-content: center;
                max-width: 720px;
                margin: 0 auto 1rem;
                padding: 0 1rem;
            }
            .letter-btn {
                width: 2.5rem;
                height: 2.5rem;
                border-radius: var(--r-sm);
                border: 1px solid var(--border);
                background: var(--surface-0);
                font-weight: 700;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.15s;
                padding: 0;
                min-height: auto;
                color: var(--text);
                text-transform: none;
                letter-spacing: 0;
            }
            .letter-btn:hover,
            .letter-btn.active {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }
            .words-container {
                max-width: 720px;
                margin: 0 auto 3rem;
                padding: 0 1rem;
            }
            .words-section h3 {
                font-size: 1.1rem;
                margin: 0 0 0.75rem;
                color: var(--accent);
            }
            .words-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 0.35rem;
            }
            .word-chip {
                padding: 0.3rem 0.6rem;
                border-radius: 999px;
                border: 1px solid var(--border);
                background: var(--surface-0);
                font-size: 0.85rem;
                cursor: default;
            }
            .word-chip:hover {
                background: rgba(14, 165, 233, 0.08);
            }
            .slownik-category-desc {
                max-width: 720px;
                margin: 0 auto 1.5rem;
                padding: 0 1rem;
                text-align: center;
                color: var(--text-muted);
                font-size: 0.9rem;
                line-height: 1.5;
            }
            .empty-state {
                text-align: center;
                padding: 3rem 1rem;
                color: var(--text-muted);
            }
            .loading {
                text-align: center;
                padding: 2rem;
                color: var(--text-muted);
            }

            /* --- Wyszukiwarka --- */
            .slownik-search {
                max-width: 560px;
                margin: 0 auto 2rem;
                padding: 0 1rem;
            }
            .slownik-search-row {
                display: flex;
                gap: 0.5rem;
                align-items: stretch;
                background: var(--surface-0);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 0.35rem;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
                transition: border-color 0.15s;
            }
            .slownik-search-row:focus-within {
                border-color: var(--accent);
            }
            .slownik-search-select {
                border: 0;
                background: transparent;
                font-size: 0.85rem;
                padding: 0.35rem 0.5rem;
                border-radius: 10px;
                color: var(--text);
                cursor: pointer;
                outline: none;
                min-width: 100px;
            }
            .slownik-search-input {
                flex: 1;
                border: 0;
                background: transparent;
                font-size: 0.95rem;
                padding: 0.4rem 0.25rem;
                outline: none;
                color: var(--text);
                min-width: 0;
            }
            .slownik-search-input::placeholder {
                color: var(--text-muted);
                opacity: 0.7;
            }
            .slownik-search-clear {
                border: 0;
                background: transparent;
                font-size: 1.2rem;
                cursor: pointer;
                color: var(--text-muted);
                padding: 0 0.5rem;
                display: flex;
                align-items: center;
            }
            .slownik-search-clear:hover {
                color: var(--text);
            }
            .slownik-search-results {
                margin-top: 0.75rem;
            }
            .slownik-search-results .words-grid {
                margin-top: 0;
            }
            @media (max-width: 480px) {
                .category-grid {
                    grid-template-columns: repeat(3, 1fr);
                }
                .category-name {
                    font-size: 0.85rem;
                }
            }
        </style>
    </head>
    <body style="background: var(--background)">
        <nav class="navbar">
            <div class="nav-container">
                <a href="/" class="logo" style="text-decoration: none"
                    >Państwa<span>Miasta</span></a
                >
                <div class="nav-links">
                    <a href="/">Strona główna</a>
                </div>
            </div>
        </nav>

        <main style="padding-top: calc(var(--nav-h) + 1rem)">
            <div class="slownik-hero">
                <h1>Słownik</h1>
                <p>
                    Tysiące słów do gry Państwa-Miasta. Wybierz kategorię i
                    literę, albo wyszukaj bezpośrednio.
                </p>
            </div>

            <div class="slownik-search" id="slownik-search-section">
                <div class="slownik-search-row">
                    <select
                        id="search-category"
                        class="slownik-search-select"
                        aria-label="Kategoria"
                    >
                        <option value="rosliny">🌿 Rośliny</option>
                        <option value="zwierzeta">🐾 Zwierzęta</option>
                        <option value="miasta">🏙️ Miasta</option>
                        <option value="zawody">💼 Zawody</option>
                        <option value="imiona">👤 Imiona</option>
                        <option value="rzeczy">📦 Rzeczy</option>
                    </select>
                    <input
                        type="text"
                        id="search-input"
                        class="slownik-search-input"
                        placeholder="Wpisz nazwę… np. róża, jabłoń, sosna"
                        autocomplete="off"
                        aria-label="Szukaj w słowniku"
                    />
                    <button
                        type="button"
                        id="search-clear-btn"
                        class="slownik-search-clear"
                        style="display: none"
                        aria-label="Wyczyść"
                    >
                        ×
                    </button>
                </div>
                <div class="slownik-search-results" id="search-results"></div>
            </div>

            <div class="category-grid" id="categories"></div>

            <div
                id="category-description"
                class="slownik-category-desc"
                style="display: none"
            >
                <p id="category-desc-text"></p>
            </div>

            <div class="letter-nav" id="letters"></div>

            <div class="words-container" id="words-container">
                <p class="empty-state">👆 Wybierz kategorię i literę powyżej</p>
            </div>
        </main>

        <footer class="site-footer">
            <div class="site-footer-inner">

                    <a href="/polityka-prywatnosci">Polityka prywatności</a>
                    <span class="site-footer-sep">·</span>
                    <a href="/cookies">Cookies</a>

                    <span class="site-footer-sep">·</span>
                    <a
                        href="https://buycoffee.to/filki"

                        rel="noopener noreferrer"
                        >Wesprzyj serwer</a
                    >
                </nav>
                <div class="site-footer-meta">
                    <span class="site-footer-brand">Państwa-Miasta</span>
                    <span class="site-footer-sep">·</span>
                    <span class="site-footer-copy">© 2026 filki</span>
                    <span class="site-footer-sep">·</span>
                    <a
                        href="https://github.com/filki"
                        target="_blank"
                        rel="noopener noreferrer"
                        >GitHub</a
                    >
                </div>
            </div>

        <script>
            const CATEGORIES = [
                { id: "miasta", name: "Miasta", icon: "🏙️" },
                { id: "rosliny", name: "Rośliny", icon: "🌿" },
                { id: "zwierzeta", name: "Zwierzęta", icon: "🐾" },
                { id: "zawody", name: "Zawody", icon: "💼" },
                { id: "imiona", name: "Imiona", icon: "👤" },
                { id: "rzeczy", name: "Rzeczy", icon: "📦" },
            ];
            const LETTERS = "AĄBCĆDEĘFGHIJKLŁMNŃOÓPRSŚTUWYZŹŻ".split("");
            let activeCategory = null;
            let activeLetter = null;
            let searchTimer = null;

            /* --- Wyszukiwarka --- */
            const searchInput = document.getElementById("search-input");
            const searchCategory = document.getElementById("search-category");
            const searchResults = document.getElementById("search-results");
            const searchClear = document.getElementById("search-clear-btn");

            async function doSearch() {
                const q = searchInput.value.trim();
                if (!q || q.length < 2) {
                    searchResults.innerHTML = "";
                    searchClear.style.display = "none";
                    return;
                }
                searchClear.style.display = "";
                searchResults.innerHTML =
                    '<p class="loading" style="padding:0.75rem">Szukanie…</p>';
                const cat = searchCategory.value;
                try {
                    const resp = await fetch(
                        `/api/dictionary/slownik/search?q=${encodeURIComponent(q)}&category=${encodeURIComponent(cat)}&limit=50`,
                    );
                    const data = await resp.json();
                    if (data.words.length === 0) {
                        searchResults.innerHTML =
                            '<p class="empty-state" style="padding:0.75rem;font-size:0.9rem">Brak wyników</p>';
                    } else {
                        searchResults.innerHTML =
                            '<div class="words-grid">' +
                            data.words
                                .map(
                                    (w) =>
                                        `<span class="word-chip">${w}</span>`,
                                )
                                .join("") +
                            "</div>";
                    }
                } catch (e) {
                    searchResults.innerHTML =
                        '<p class="empty-state" style="padding:0.75rem;font-size:0.9rem">Błąd wyszukiwania</p>';
                }
            }

            searchInput.addEventListener("input", function () {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(doSearch, 200);
            });
            searchInput.addEventListener("search", doSearch);
            searchCategory.addEventListener("change", doSearch);
            searchClear.addEventListener("click", function () {
                searchInput.value = "";
                searchResults.innerHTML = "";
                searchClear.style.display = "none";
                searchInput.focus();
            });

            async function loadCategories() {
                const grid = document.getElementById("categories");
                try {
                    const resp = await fetch(
                        "/api/dictionary/slownik/categories",
                    );
                    const counts = await resp.json();
                    grid.innerHTML = CATEGORIES.map(
                        (c) => `
                <button class="category-card" data-cat="${c.id}" onclick="selectCategory('${c.id}')">
                    <span class="category-icon">${c.icon}</span>
                    <span class="category-name">${c.name}</span>
                    <span class="category-count">${(counts[c.id] || 0).toLocaleString()} słów</span>
                </button>
            `,
                    ).join("");
                } catch (e) {
                    grid.innerHTML = CATEGORIES.map(
                        (c) => `
                <button class="category-card" data-cat="${c.id}" onclick="selectCategory('${c.id}')">
                    <span class="category-icon">${c.icon}</span>
                    <span class="category-name">${c.name}</span>
                </button>
            `,
                    ).join("");
                }
            }

            var CATEGORY_DESCRIPTIONS = {
                miasta: "Miasta to jedna z najbogatszych kategorii — w bazie znajduje się ponad 32 tysiące miejscowości z Polski i świata, od małych wsi po wielkie metropolie. Wystarczy, że nazwa zaczyna się na wylosowaną literę.",
                rosliny:
                    "Rośliny obejmują kwiaty, drzewa, krzewy, owoce, warzywa, zioła i grzyby. Baza zawiera około 19 tysięcy haseł — od popularnych gatunków po egzotyczne okazy.",
                zwierzeta:
                    "Zwierzęta to ssaki, ptaki, gady, płazy, ryby i owady. W słowniku znajdziesz około 10 tysięcy gatunków, od domowych pupili po dzikie zwierzęta z całego świata.",
                zawody: "Zawody to profesje i role społeczne — od tradycyjnych rzemieślników po nowoczesne specjalizacje. Kategoria zawiera kilkaset haseł, które wystarczą na wiele rund.",
                imiona: "Imiona to kategoria, w której liczy się kreatywność — możesz podać dowolne imię żeńskie, męskie lub zdrobnienie. Baza zawiera popularne i rzadkie imiona z różnych krajów.",
                rzeczy: "Rzeczy to najszersza kategoria — wszystko, co nas otacza: przedmioty codziennego użytku, narzędzia, ubrania, meble, elektronika i wiele więcej. Ponad 5 tysięcy haseł czeka na odkrycie.",
            };

            function showCategoryDescription(cat) {
                var descEl = document.getElementById("category-description");
                var textEl = document.getElementById("category-desc-text");
                if (descEl && textEl && CATEGORY_DESCRIPTIONS[cat]) {
                    textEl.textContent = CATEGORY_DESCRIPTIONS[cat];
                    descEl.style.display = "";
                } else if (descEl) {
                    descEl.style.display = "none";
                }
            }

            function renderLetters() {
                const nav = document.getElementById("letters");
                nav.innerHTML = LETTERS.map(
                    (l) => `
            <button class="letter-btn" data-letter="${l}" onclick="selectLetter('${l}')">${l}</button>
        `,
                ).join("");
                nav.style.display = activeCategory ? "flex" : "none";
            }

            function selectCategory(cat) {
                activeCategory = cat;
                activeLetter = null;
                document
                    .querySelectorAll(".category-card")
                    .forEach((c) =>
                        c.classList.toggle("active", c.dataset.cat === cat),
                    );
                document
                    .querySelectorAll(".letter-btn")
                    .forEach((b) => b.classList.remove("active"));
                renderLetters();
                document.getElementById("words-container").innerHTML =
                    '<p class="empty-state">👆 Wybierz literę</p>';
                showCategoryDescription(cat);
            }

            async function selectLetter(letter) {
                activeLetter = letter;
                document
                    .querySelectorAll(".letter-btn")
                    .forEach((b) =>
                        b.classList.toggle(
                            "active",
                            b.dataset.letter === letter,
                        ),
                    );
                const container = document.getElementById("words-container");
                container.innerHTML = '<p class="loading">Ładowanie...</p>';

                try {
                    const resp = await fetch(
                        `/api/dictionary/slownik/${activeCategory}/${encodeURIComponent(letter)}`,
                    );
                    const data = await resp.json();
                    container.innerHTML = `
                <div class="words-section">
                    <h3>${CATEGORIES.find((c) => c.id === activeCategory).name} na literę ${letter}</h3>
                    <div class="words-grid">
                        ${data.words.map((w) => `<span class="word-chip">${w}</span>`).join("")}
                    </div>
                    ${data.words.length === 0 ? '<p class="empty-state" style="padding:1rem">Brak słów na tę literę</p>' : ""}
                </div>
            `;
                } catch (e) {
                    container.innerHTML =
                        '<p class="empty-state">Błąd ładowania. Spróbuj ponownie.</p>';
                }
            }

            loadCategories();
            renderLetters();
        </script>
    </body>
</html>
