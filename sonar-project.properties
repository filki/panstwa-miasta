# ============================================================
# SonarQube Cloud (CI na main) — https://sonarcloud.io → filip-org / filip-org_panstwa-masta
# ============================================================

sonar.organization=filip-org
sonar.projectKey=filip-org_panstwa-masta
sonar.projectName=Panstwa-Miasta
sonar.host.url=https://sonarcloud.io

sonar.projectVersion=0.1.0

# Źródła do analizy (kod produkcyjny). HTML/CSS w static/ nie są tu liczone — eliminuje
# fałszywe duplikacje (polityka/cookies/regulamin) i „nowy kod” bez sensownego pokrycia.
# JS w static/js nadal trafia pod analizę + lcov z Jest.
sonar.sources=src,static/js

# Pliki testów
sonar.tests=tests

# Encoding plików
sonar.sourceEncoding=UTF-8

# Wersja Pythona (ważne: bez ">=", tylko np. 3.13)
sonar.python.version=3.13

# Wyklucz środowisko wirtualne, artefakty i seed-data (dane, nie kod)
sonar.exclusions=\
  .venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  logs/**,\
  *.db,\
  .sonar/**,\
  **/cities_seed.py,\
  **/cities_seed_pl_generated.py,\
  **/countries_seed.py,\
  **/jobs_seed.py,\
  **/names_seed.py,\
  scripts/seed_data/**,\
  scripts/**,\
  data/**

# ---- Raporty pokrycia (generuje CI: pytest + jest) ----
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
sonar.javascript.lcov.reportPaths=coverage-js/lcov.info
