# ============================================================
# SonarQube – konfiguracja projektu Państwa-Miasta
# ============================================================

# Unikalny klucz projektu w SonarQube
sonar.projectKey=panstwa-masta
sonar.projectName=Panstwa-Miasta

# Wersja projektu (możesz też podpiąć zmienną CI/CD)
sonar.projectVersion=0.1.0

# Źródła do analizy (kod produkcyjny)
sonar.sources=src,static

# Pliki testów
sonar.tests=tests

# Encoding plików
sonar.sourceEncoding=UTF-8

# Wersja Pythona (ważne: bez ">=", tylko np. 3.13)
sonar.python.version=3.13

# Wyklucz środowisko wirtualne i artefakty
sonar.exclusions=\
  .venv/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  logs/**,\
  *.db,\
  .sonar/**

# ---- Jeśli masz raporty pokrycia testów (coverage.xml) ----
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
sonar.javascript.lcov.reportPaths=coverage-js/lcov.info

# ---- Połączenie z serwerem ----
# Możesz tu wpisać na stałe (dla środowiska lokalnego)
# lub przekazywać przez zmienne środowiskowe / CI secrets.
sonar.host.url=http://localhost:9000
# sonar.token=<WKLEJ_TOKEN_TUTAJ_LUB_PRZEKAZ_PRZEZ_ENV>
