name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-vps
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: VPS (git pull + uv + restart)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push' &&
        vars.DEPLOY_ENABLED == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload deploy script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/vps-pull-and-restart.sh
          target: /tmp/

      - name: Run deploy script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 8m
          script: |
            set -euo pipefail
            chmod +x /tmp/vps-pull-and-restart.sh
            DEPLOY_APP_DIR="${{ secrets.DEPLOY_APP_DIR }}" /tmp/vps-pull-and-restart.sh
            rm -f /tmp/vps-pull-and-restart.sh
