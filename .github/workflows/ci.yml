name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install
      - run: uv sync --extra dev --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .

  types:
    name: Types (ty)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install
      - run: uv sync --extra dev --frozen
      - run: uv run ty check src

  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, types]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install
      - run: uv sync --extra dev --frozen
      - run: uv run pytest --ignore=tests/test_data.py --ignore=tests/test_db.py --ignore=tests/test_coverage_boost.py --ignore=tests/test_gbif_seed.py --ignore=tests/test_geo_answer_aliases.py --ignore=tests/test_norms_seed_batch.py --ignore=tests/test_seed_data_loader.py --ignore=tests/test_init_db_seeds.py --ignore=tests/test_plants_atlas_parse.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-python
          path: |
            coverage.xml
            test-results.xml
          if-no-files-found: ignore
          retention-days: 7

  js:
    name: Frontend (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, types]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test --silent
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-js
          path: coverage-js
          if-no-files-found: ignore
          retention-days: 7

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [tests, js]
    continue-on-error: true
    # Informational only — SonarCloud does NOT block deploy.
    # Deploy gate: lint + types + pytest + jest (all must pass).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: coverage-python
          path: .
      - uses: actions/download-artifact@v7
        with:
          name: coverage-js
          path: coverage-js
      - name: SonarQube Cloud Scan
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          unzip -q -o sonar-scanner-cli-6.2.1.4610-linux-x64.zip
          ./sonar-scanner-6.2.1.4610-linux-x64/bin/sonar-scanner \
            -Dsonar.token="$SONAR_TOKEN"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Quality Gate is informational only — does not block deploy.
      # Deploy gate: lint + types + pytest + jest (all must pass).
