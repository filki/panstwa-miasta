name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Pin Python from .python-version
        run: uv python install

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check (ty)
        run: uv run ty check src

      - name: Pytest with coverage
        run: uv run pytest

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python
          path: |
            coverage.xml
            test-results.xml
          if-no-files-found: ignore
          retention-days: 7

  js:
    name: Frontend (jest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run jest
        run: npm test --silent

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-js
          path: coverage-js
          if-no-files-found: ignore
          retention-days: 7

  # SonarQube Cloud — tylko po pushu na main (np. po merge PR). Sekret: SONAR_TOKEN z sonarcloud.io.
  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [python, js]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Python coverage + JUnit
        uses: actions/download-artifact@v7
        with:
          name: coverage-python
          path: .

      - name: Download JS coverage (lcov)
        uses: actions/download-artifact@v7
        with:
          name: coverage-js
          path: coverage-js

      - name: SonarQube Cloud Scan (attempt 1)
        id: sonar1
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Cloud Scan (attempt 2)
        if: steps.sonar1.outcome == 'failure'
        id: sonar2
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Cloud Scan (attempt 3)
        if: steps.sonar2.outcome == 'failure'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
